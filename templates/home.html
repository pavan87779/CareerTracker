{% extends 'base.html' %}

{% block content %}

<div class="text-center">
    <h1>Welcome to CareerTracker</h1>
    <p class="lead">
        Track your job applications, interviews, resumes, and career progress.
    </p>

    {% if user.is_authenticated %}

    <a href="{% url 'dashboard' %}"
       class="btn btn-primary btn-lg">

        Get Started

    </a>

{% else %}

    <a href="{% url 'register' %}"
       class="btn btn-primary btn-lg">

        Get Started

    </a>

{% endif %}
</div>

{% endblock %}
