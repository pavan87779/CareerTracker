{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>
        My Resumes
    </h2>

    <a href="{% url 'upload_resume' %}"
       class="btn btn-primary">
        Upload Resume
    </a>

</div>

<div class="table-responsive">

    <table class="table table-bordered table-hover shadow">

        <thead class="table-dark">

            <tr>

                <th>Title</th>

                <th>Tags</th>

                <th>Uploaded</th>

                <th>Download</th>

                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            {% for resume in resumes %}

            <tr>

                <td>
                    {{ resume.title }}
                </td>

                <td>
                    {{ resume.tags }}
                </td>

                <td>
                    {{ resume.uploaded_at }}
                </td>

                <td>

                    <a href="{{ resume.resume_file.url }}"
                       class="btn btn-sm btn-success"
                       target="_blank">

                        Download

                    </a>

                </td>

                <td>

                    <a href="{% url 'delete_resume' resume.id %}"
                       class="btn btn-sm btn-danger">

                        Delete

                    </a>

                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="5"
                    class="text-center">

                    No resumes uploaded.

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
