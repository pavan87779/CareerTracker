{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-4">

            <h2 class="text-danger text-center mb-4">

                Delete Resume

            </h2>

            <p class="text-center">

                Are you sure you want to delete:

                <strong>
                    {{ resume.title }}
                </strong>

            </p>

            <form method="POST">

                {% csrf_token %}

                <button type="submit"
                        class="btn btn-danger w-100">

                    Confirm Delete

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
