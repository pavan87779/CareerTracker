{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">
                Edit Job Application
            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-success w-100">
                    Update Application
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
