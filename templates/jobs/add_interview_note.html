{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">

                Add Interview Note

            </h2>

            <h5 class="mb-4">

                {{ job.company_name }} - {{ job.role }}

            </h5>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-primary w-100">

                    Save Note

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
